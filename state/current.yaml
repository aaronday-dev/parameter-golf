study_findings:
  - Exact post-roundtrip val_bpb beat prettier reconstruction metrics and proxy wins.
  - Straightforward sequential capacity beat most recurrence, damping, and stabilization ideas locally.
  - Offline artifact design delivered the capped repo leader more effectively than another nearby architecture retrain.
  - Mixed-bit calibration created major byte headroom, but not a direct no-retrain frontier win.
  - The remaining unanswered question was a bounded external-compute retrain, not another local mechanism branch.

